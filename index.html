<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="snake"></div>
        <div class="infos">
          <div class="info">
            Score:
            <span id="score">0</span>
          </div>

          <div class="info">
            HighScore:
            <span id="highScore">0</span>
          </div>

          <div class="info">
            Time:
            <span id="time">00-00</span>
          </div>
        </div>
        <div class="board"></div>

        <div class="modal">
          <div class="start-game">
            <h3>Welcome to snake game</h3>
            <div class="btn btn-start">Start</div>
          </div>
          <div class="game-over">
            <h3>GAME OVER</h3>
            <div class="btn btn-restart">Restart</div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
